<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发货单管理系统专业版</title>
    <style>
        :root {
            --primary: #4361ee;
            --danger: #ef233c;
            --bg: #f8f9fa;
            --text: #2b2d42;
            --border: #dee2e6;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; }
        
        body, html { 
            background-color: var(--bg); 
            color: var(--text); 
            height: 100%;
            overflow-x: hidden;
        }

        /* 页面切换核心样式 */
        .page { 
            display: none; 
            min-height: 100vh; 
            width: 100%;
            padding: 15px;
            animation: fadeIn 0.2s ease-in-out;
        }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 首页样式 */
        #page-home { 
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        #page-home.active { display: flex; }
        .home-logo { font-size: 60px; margin-bottom: 20px; }
        .btn-main { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 18px 40px; 
            border-radius: 50px; 
            font-size: 20px; 
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
            transition: 0.3s;
            cursor: pointer;
        }
        .btn-main:disabled { background: #ccc; box-shadow: none; }

        /* 通用组件 */
        button { border: none; border-radius: 6px; padding: 10px 15px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        .btn-sec { background: #6c757d; color: white; }
        .btn-danger { background: var(--danger); color: white; }
        input, select { padding: 8px; border: 1px solid var(--border); border-radius: 6px; outline: none; }

        /* 日历样式 */
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: white; padding: 15px; border-radius: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; background: white; padding: 10px; border-radius: 10px; }
        .day-header { text-align: center; font-weight: bold; font-size: 12px; color: #888; padding: 5px 0; }
        .day-cell { 
            background: #fff; border: 1px solid #f0f0f0; height: 70px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 6px; cursor: pointer; position: relative;
        }
        .day-cell.today { background: #eef2ff; border-color: var(--primary); }
        .day-cell .num { font-weight: bold; font-size: 16px; }
        .day-cell .badge { font-size: 10px; color: var(--primary); margin-top: 4px; font-weight: bold; }

        /* 列表页样式 */
        .sticky-bar { 
            position: sticky; top: -15px; z-index: 100; 
            background: var(--bg); padding: 10px 0; 
            border-bottom: 1px solid var(--border);
            display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
        }
        .product-card { 
            background: white; border-radius: 12px; padding: 12px; margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; gap: 12px; align-items: flex-start;
        }
        .item-img { width: 85px; height: 85px; object-fit: cover; border-radius: 8px; background: #eee; flex-shrink: 0; }
        .item-info { flex: 1; min-width: 0; }
        .item-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 8px; }
        .item-inputs input { font-size: 12px; padding: 4px 6px; }

        .size-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
        .size-item { 
            background: #f8f9fa; border: 1px solid #eee; border-radius: 6px; 
            min-width: 55px; text-align: center; padding: 4px; flex-shrink: 0;
        }
        .size-item div { font-size: 11px; font-weight: bold; margin-bottom: 3px; }
        .size-item input { width: 100%; border: none; border-bottom: 1px solid #ddd; background: transparent; text-align: center; padding: 2px 0; font-size: 13px; }

        .item-summary { 
            border-left: 1px dashed #ddd; padding-left: 10px; 
            display: flex; flex-direction: column; justify-content: center; gap: 5px;
        }
        .sum-box { text-align: center; min-width: 50px; }
        .sum-box .label { font-size: 10px; color: #888; display: block; }
        .sum-box .val { font-size: 18px; font-weight: 900; }
        .val.ship { color: var(--primary); }
        .val.ret { color: var(--danger); }

        /* 弹窗样式 */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; 
        }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 95%; max-width: 500px; border-radius: 15px; padding: 20px; max-height: 90vh; overflow-y: auto; }
        .history-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; }
        .hist-card { border: 2px solid transparent; border-radius: 8px; text-align: center; cursor: pointer; min-width: 70px; }
        .hist-card.selected { border-color: var(--primary); background: #f0f4ff; }
        .hist-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }

        @media (max-width: 600px) {
            .product-card { flex-direction: column; }
            .item-summary { border-left: none; border-top: 1px dashed #eee; padding-left: 0; padding-top: 10px; flex-direction: row; width: 100%; justify-content: space-around; }
            .item-img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

    <!-- 首页 -->
    <div id="page-home" class="page active">
        <div class="home-logo">📦</div>
        <h1 style="margin-bottom: 10px;">发货管理系统</h1>
        <p style="color: #666; margin-bottom: 30px;">大容量 IndexedDB 存储版</p>
        <button id="btn-enter" class="btn-main" disabled>正在初始化...</button>
        <button onclick="clearAllData()" style="margin-top: 40px; background: none; color: #aaa; text-decoration: underline; font-size: 12px;">重置并清空所有数据</button>
    </div>

    <!-- 日历页 -->
    <div id="page-calendar" class="page">
        <div class="calendar-nav">
            <button class="btn-sec" onclick="changeMonth(-1)">◀ 上月</button>
            <h2 id="month-title">2023年10月</h2>
            <button class="btn-sec" onclick="changeMonth(1)">下月 ▶</button>
        </div>
        
        <div style="margin-bottom: 15px; display: flex; gap: 10px; justify-content: center;">
            <select id="sel-year" onchange="jumpToDate()"></select>
            <select id="sel-month" onchange="jumpToDate()"></select>
            <button class="btn-sec" onclick="goToday()">回今天</button>
        </div>

        <div class="calendar-grid" id="calendar-grid"></div>

        <div id="calendar-stat" style="margin-top: 20px; background: white; padding: 20px; border-radius: 12px; text-align: center;">
            <div style="color: #888; font-size: 14px; margin-bottom: 5px;">今日概览</div>
            <div id="stat-content">--</div>
        </div>
        
        <button onclick="showPage('page-home')" style="width:100%; margin-top:20px; padding:15px; background:#ddd;">返回首页</button>
    </div>

    <!-- 列表页 -->
    <div id="page-list" class="page">
        <div class="sticky-bar">
            <button class="btn-sec" onclick="showPage('page-calendar')">◀ 返回</button>
            <strong id="list-date-label" style="flex:1; font-size:16px;"></strong>
            <button style="background:var(--primary); color:white" onclick="openAddModal()">+ 新增货物</button>
            <button class="btn-danger" onclick="deleteSelected()">删除</button>
            <button class="btn-sec" id="btn-group" onclick="toggleGroup()">按货源分类</button>
        </div>

        <div id="product-list-container" style="margin-top: 15px;"></div>
    </div>

    <!-- 新增弹窗 -->
    <div id="modal-add" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px;">新增货物</h3>
            
            <label style="font-size:12px; color:#888;">从最近使用中选择：</label>
            <div class="history-scroll" id="history-list"></div>

            <div style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; font-weight:bold;">1. 上传新图片</label>
                <input type="file" id="file-input" accept="image/*" style="width:100%">
                <img id="img-preview" style="width:80px; height:80px; object-fit:cover; display:none; margin-top:10px; border-radius:5px;">
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
                <div>
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">2. 价格</label>
                    <input type="number" id="form-price" placeholder="金额" style="width:100%">
                </div>
                <div>
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">3. 货源</label>
                    <input type="text" id="form-source" list="source-options" placeholder="货源地" style="width:100%">
                    <datalist id="source-options"></datalist>
                </div>
            </div>

            <div style="display:flex; gap:10px;">
                <button class="btn-sec" style="flex:1" onclick="closeModal()">取消</button>
                <button style="flex:2; background:var(--primary); color:white;" onclick="handleSave()">保存到今日清单</button>
            </div>
        </div>
    </div>

<script>
    /* --- 数据库与数据引擎 --- */
    const DB_NAME = 'ShipDB_Pro';
    const STORE_NAME = 'DataStore';
    let db_cache = {};
    const SIZES = ['S', 'M', 'L', 'XL', '2XL', '3XL', '4XL'];

    function initDB() {
        return new Promise((resolve) => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
            req.onsuccess = (e) => resolve(e.target.result);
        });
    }

    async function loadAll() {
        const idb = await initDB();
        return new Promise(res => {
            const tx = idb.transaction(STORE_NAME, 'readonly');
            const req = tx.objectStore(STORE_NAME).get('SHIP_DATA');
            req.onsuccess = () => res(req.result || {});
        });
    }

    async function persist() {
        const idb = await initDB();
        const tx = idb.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(db_cache, 'SHIP_DATA');
    }

    function clearAllData() {
        if(confirm("确定要永久清空所有数据和图片吗？")) {
            indexedDB.deleteDatabase(DB_NAME);
            location.reload();
        }
    }

    /* --- 核心业务变量 --- */
    let viewDate = new Date();
    let activeDateStr = '';
    let isGrouped = false;
    let selectedImgBase64 = '';

    window.onload = async () => {
        db_cache = await loadAll();
        const btn = document.getElementById('btn-enter');
        btn.innerText = '进入管理系统';
        btn.disabled = false;
        btn.onclick = () => {
            showPage('page-calendar');
            renderCalendar();
        };
        initSelectors();
    };

    /* --- 导航控制 --- */
    function showPage(pageId) {
        // 1. 隐藏所有页面
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        // 2. 强制回到顶部
        window.scrollTo(0, 0);
        // 3. 显示目标页
        const target = document.getElementById(pageId);
        target.classList.add('active');
        
        // 4. 特殊页面逻辑
        if(pageId === 'page-calendar') {
            updateGlobalStat(fmtDate(new Date()));
        }
    }

    /* --- 日历逻辑 --- */
    function initSelectors() {
        const ys = document.getElementById('sel-year'), ms = document.getElementById('sel-month');
        const curY = new Date().getFullYear();
        for(let i=curY-2; i<=curY+2; i++) ys.add(new Option(i+'年', i));
        for(let i=0; i<12; i++) ms.add(new Option((i+1)+'月', i));
        ys.value = viewDate.getFullYear();
        ms.value = viewDate.getMonth();
    }

    function changeMonth(d) { viewDate.setMonth(viewDate.getMonth() + d); syncSelectors(); renderCalendar(); }
    function jumpToDate() { viewDate.setFullYear(document.getElementById('sel-year').value); viewDate.setMonth(document.getElementById('sel-month').value); renderCalendar(); }
    function goToday() { viewDate = new Date(); syncSelectors(); renderCalendar(); }
    function syncSelectors() { document.getElementById('sel-year').value = viewDate.getFullYear(); document.getElementById('sel-month').value = viewDate.getMonth(); }
    function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

    function renderCalendar() {
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        document.getElementById('month-title').innerText = `${y}年${m+1}月`;
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        ['日','一','二','三','四','五','六'].forEach(w => grid.innerHTML += `<div class="day-header">${w}</div>`);
        
        const firstDay = new Date(y, m, 1).getDay();
        const days = new Date(y, m+1, 0).getDate();
        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;

        const today = fmtDate(new Date());
        for(let i=1; i<=days; i++) {
            const dStr = fmtDate(new Date(y, m, i));
            const cell = document.createElement('div');
            cell.className = `day-cell ${dStr === today ? 'today' : ''}`;
            
            let count = 0;
            if(db_cache[dStr]) db_cache[dStr].forEach(p => SIZES.forEach(s => count += (p.sizes[s].s || 0)));
            
            cell.innerHTML = `<span class="num">${i}</span>${count > 0 ? `<span class="badge">发:${count}</span>` : ''}`;
            cell.onclick = () => openDateList(dStr);
            grid.appendChild(cell);
        }
    }

    function updateGlobalStat(dStr) {
        let s = 0, r = 0;
        if(db_cache[dStr]) db_cache[dStr].forEach(p => SIZES.forEach(sz => { s += p.sizes[sz].s; r += p.sizes[sz].r; }));
        document.getElementById('stat-content').innerHTML = `
            <span style="font-size:14px; color:#666">${dStr}</span><br>
            <span style="color:var(--primary); font-size:24px; font-weight:bold;">${s}</span> 发货 | 
            <span style="color:var(--danger); font-size:24px; font-weight:bold;">${r}</span> 退货
        `;
    }

    /* --- 列表逻辑 --- */
    function openDateList(dStr) {
        activeDateStr = dStr;
        document.getElementById('list-date-label').innerText = dStr;
        isGrouped = false;
        renderList();
        showPage('page-list');
    }

    function renderList() {
        const container = document.getElementById('product-list-container');
        container.innerHTML = '';
        const list = db_cache[activeDateStr] || [];
        
        if(list.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:#bbb; padding-top:50px;">今日空空如也，点击右上角新增</div>`;
            return;
        }

        if(isGrouped) {
            const groups = {};
            list.forEach(p => { const src = p.source || '未分类'; if(!groups[src]) groups[src] = []; groups[src].push(p); });
            for(let src in groups) {
                const head = document.createElement('div');
                head.style = "padding:10px; font-weight:bold; background:#eee; border-radius:5px; margin:10px 0;";
                head.innerText = `货源: ${src}`;
                container.appendChild(head);
                groups[src].forEach(p => container.appendChild(createItemCard(p)));
            }
        } else {
            list.forEach(p => container.appendChild(createItemCard(p)));
        }
        updateGlobalStat(activeDateStr);
    }

    function createItemCard(p) {
        const card = document.createElement('div');
        card.className = 'product-card';
        let sSum = 0, rSum = 0;
        SIZES.forEach(s => { sSum += p.sizes[s].s; rSum += p.sizes[s].r; });

        card.innerHTML = `
            <input type="checkbox" class="item-sel" value="${p.id}" style="margin-top:5px">
            <img src="${p.img}" class="item-img">
            <div class="item-info">
                <div class="item-inputs">
                    <input type="number" value="${p.price}" placeholder="价格" onchange="updateInfo('${p.id}','price',this.value)">
                    <input type="text" value="${p.source}" placeholder="货源" onchange="updateInfo('${p.id}','source',this.value)">
                </div>
                <div class="size-grid">
                    ${SIZES.map(s => `
                        <div class="size-item">
                            <div>${s}</div>
                            <input type="number" value="${p.sizes[s].s || ''}" placeholder="发" onchange="updateQty('${p.id}','${s}','s',this.value)">
                            <input type="number" value="${p.sizes[s].r || ''}" placeholder="退" onchange="updateQty('${p.id}','${s}','r',this.value)">
                        </div>
                    `).join('')}
                </div>
            </div>
            <div class="item-summary">
                <div class="sum-box"><span class="label">发</span><span class="val ship">${sSum}</span></div>
                <div class="sum-box"><span class="label">退</span><span class="val ret">${rSum}</span></div>
            </div>
        `;
        return card;
    }

    function updateQty(pid, size, type, val) {
        const p = db_cache[activeDateStr].find(x => x.id === pid);
        if(p) { p.sizes[size][type] = parseInt(val) || 0; persist(); renderList(); }
    }

    function updateInfo(pid, field, val) {
        const p = db_cache[activeDateStr].find(x => x.id === pid);
        if(p) { p[field] = val; persist(); if(isGrouped && field === 'source') renderList(); }
    }

    function toggleGroup() { isGrouped = !isGrouped; renderList(); }

    function deleteSelected() {
        const ids = Array.from(document.querySelectorAll('.item-sel:checked')).map(el => el.value);
        if(ids.length === 0) return;
        if(confirm(`确定删除选中的 ${ids.length} 项吗?`)) {
            db_cache[activeDateStr] = db_cache[activeDateStr].filter(p => !ids.includes(p.id));
            persist(); renderList();
        }
    }

    /* --- 新增弹窗逻辑 --- */
    function openAddModal() {
        selectedImgBase64 = '';
        document.getElementById('img-preview').style.display = 'none';
        document.getElementById('form-price').value = '';
        document.getElementById('form-source').value = '';
        document.getElementById('file-input').value = '';
        loadHistory();
        document.getElementById('modal-add').classList.add('active');
    }

    function closeModal() { document.getElementById('modal-add').classList.remove('active'); }

    function loadHistory() {
        const histDiv = document.getElementById('history-list');
        const opts = document.getElementById('source-options');
        histDiv.innerHTML = ''; opts.innerHTML = '';
        const history = [];
        const sources = new Set();

        for(let d in db_cache) {
            db_cache[d].forEach(p => {
                sources.add(p.source);
                if(!history.find(h => h.img === p.img)) {
                    history.push({ img: p.img, price: p.price, source: p.source });
                }
            });
        }
        sources.forEach(s => opts.innerHTML += `<option value="${s}">`);
        
        if(history.length === 0) histDiv.innerHTML = '<span style="color:#ccc; font-size:12px;">暂无历史记录</span>';
        history.reverse().slice(0, 10).forEach(h => {
            const div = document.createElement('div');
            div.className = 'hist-card';
            div.innerHTML = `<img src="${h.img}"><div style="font-size:10px; color:#888;">${h.source}</div>`;
            div.onclick = () => {
                document.querySelectorAll('.hist-card').forEach(c => c.classList.remove('selected'));
                div.classList.add('selected');
                selectedImgBase64 = h.img;
                document.getElementById('form-price').value = h.price;
                document.getElementById('form-source').value = h.source;
            };
            histDiv.appendChild(div);
        });
    }

    document.getElementById('file-input').onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const max = 300;
                let w = img.width, h = img.height;
                if(w > h) { if(w > max) { h *= max/w; w = max; } } else { if(h > max) { w *= max/h; h = max; } }
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                selectedImgBase64 = canvas.toDataURL('image/jpeg', 0.6);
                const prev = document.getElementById('img-preview');
                prev.src = selectedImgBase64;
                prev.style.display = 'block';
                document.querySelectorAll('.hist-card').forEach(c => c.classList.remove('selected'));
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    function handleSave() {
        if(!selectedImgBase64) return alert("请上传或选择图片");
        const price = document.getElementById('form-price').value;
        const source = document.getElementById('form-source').value;
        
        if(!db_cache[activeDateStr]) db_cache[activeDateStr] = [];
        const newProduct = {
            id: Date.now().toString(36),
            img: selectedImgBase64,
            price: price,
            source: source,
            sizes: {}
        };
        SIZES.forEach(s => newProduct.sizes[s] = { s:0, r:0 });
        
        db_cache[activeDateStr].push(newProduct);
        persist();
        closeModal();
        renderList();
    }
</script>
</body>
</html>
