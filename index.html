
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>档口货源管家 v3.2</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
    <style>
        [v-cloak] { display: none; }
        /* 防止iOS输入框自动放大 */
        input, select, textarea { font-size: 16px !important; }
        .product-card:hover .delete-btn { opacity: 1; }
        /* 移动端特殊处理：删除按钮始终可见 */
        @media (max-width: 768px) {
            .delete-btn { opacity: 1 !important; background: rgba(255,255,255,0.9); }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 font-sans selection:bg-blue-100">
    <div id="app" v-cloak class="min-h-screen flex flex-col">
        
        <!-- 顶部导航 -->
        <header class="bg-white border-b px-4 md:px-6 py-3 flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <div class="flex items-center space-x-2 cursor-pointer" @click="goHome">
                <div class="bg-blue-600 text-white p-1.5 rounded-lg text-lg">📦</div>
                <h1 class="text-lg font-bold tracking-tight">货源管理</h1>
            </div>
            <div class="flex items-center space-x-2">
                <button @click="exportData" class="text-xs font-medium text-slate-600 px-2 py-2">导出</button>
                <label class="text-xs bg-slate-900 text-white px-3 py-2 rounded-full cursor-pointer">
                    导入 <input type="file" class="hidden" @change="importData" accept=".json">
                </label>
            </div>
        </header>

        <main class="flex-1 max-w-6xl w-full mx-auto p-4 md:p-6">
            
            <!-- 1. 首页按钮 -->
            <div v-if="view === 'home'" class="flex flex-col md:flex-row items-center justify-center space-y-6 md:space-y-0 md:space-x-8 py-10 md:h-[70vh]">
                <button @click="view = 'stalls'" class="w-full max-w-xs md:w-64 h-48 md:h-64 bg-white rounded-3xl shadow-lg border border-gray-100 flex flex-col items-center justify-center hover:scale-105 transition-all group">
                    <span class="text-5xl mb-4">🏪</span>
                    <span class="text-xl font-bold">档口管理</span>
                    <p class="text-gray-400 text-sm mt-2">点击增删改档口</p>
                </button>
                <button @click="view = 'all_products'" class="w-full max-w-xs md:w-64 h-48 md:h-64 bg-white rounded-3xl shadow-lg border border-gray-100 flex flex-col items-center justify-center hover:scale-105 transition-all group">
                    <span class="text-5xl mb-4">👕</span>
                    <span class="text-xl font-bold">全库查询</span>
                    <p class="text-gray-400 text-sm mt-2">查看所有货物对应</p>
                </button>
            </div>

            <!-- 2. 档口管理列表 -->
            <div v-if="view === 'stalls'" class="space-y-6">
                <!-- 返回与操作栏 -->
                <div class="flex items-center justify-between">
                    <button @click="view = 'home'" class="flex items-center text-blue-600 font-bold px-3 py-2 bg-blue-50 rounded-xl">
                        <span class="mr-1">←</span> 返回首页
                    </button>
                    <button v-if="!showStallForm" @click="openStallForm()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-blue-200 shadow-lg">
                        + 新增档口
                    </button>
                </div>

                <!-- 档口表单 -->
                <div v-if="showStallForm" class="bg-white border-2 border-blue-100 p-5 rounded-3xl shadow-sm">
                    <h3 class="text-lg font-bold mb-4">{{ stallForm.id ? '修改档口' : '创建新档口' }}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input v-model="stallForm.name" type="text" placeholder="档口名称 (必填)" class="border p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 ring-blue-500">
                        <input v-model="stallForm.phone" type="text" placeholder="联系电话" class="border p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 ring-blue-500">
                        <input v-model="stallForm.remark" type="text" placeholder="备注信息" class="border p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 ring-blue-500">
                    </div>
                    <div class="flex justify-end mt-4 space-x-3">
                        <button @click="showStallForm = false" class="px-6 py-2 text-gray-500 font-bold">取消</button>
                        <button @click="saveStall" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold">保存</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div v-for="item in stalls" :key="item.id" class="bg-white p-5 rounded-3xl border border-gray-100 shadow-sm">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex-1 min-w-0" @click="enterStall(item)">
                                <h4 class="text-lg font-bold text-gray-800 truncate">{{ item.name }}</h4>
                                <p class="text-blue-600 text-sm mt-1">{{ item.phone || '无电话' }}</p>
                            </div>
                            <div class="flex space-x-3 ml-2">
                                <button @click="openStallForm(item)" class="text-blue-500 text-xs font-bold">编辑</button>
                                <button @click="deleteStall(item.id)" class="text-red-400 text-xs font-bold">删除</button>
                            </div>
                        </div>
                        <p class="text-gray-400 text-xs mb-4 truncate">{{ item.remark || '暂无备注' }}</p>
                        <button @click="enterStall(item)" class="w-full bg-blue-50 text-blue-700 py-3.5 rounded-2xl font-bold hover:bg-blue-100 transition">
                            查看货物 ({{ getCount(item.id) }})
                        </button>
                    </div>
                </div>
            </div>

            <!-- 3. 具体档口详情 -->
            <div v-if="view === 'stall_detail'" class="space-y-6">
                <!-- 返回按钮 -->
                <div class="flex items-center justify-between">
                    <button @click="view = 'stalls'" class="flex items-center text-blue-600 font-bold px-3 py-2 bg-blue-50 rounded-xl">
                        <span class="mr-1">←</span> 返回列表
                    </button>
                    <div class="flex-1 text-right ml-4">
                        <h2 class="text-lg font-black truncate">{{ currentStall.name }}</h2>
                    </div>
                </div>

                <!-- 录入面板 -->
                <div class="bg-white p-4 md:p-6 rounded-[2rem] shadow-xl border border-gray-50">
                    <div class="flex flex-col lg:flex-row gap-6">
                        <!-- 上传区 -->
                        <div class="flex flex-col space-y-3 w-full lg:w-64">
                            <label class="text-xs font-bold text-gray-400">第一步：上传图片</label>
                            <div class="grid grid-cols-2 lg:grid-cols-1 gap-3">
                                <button @click="$refs.imgInput.click()" class="flex flex-col items-center justify-center p-5 border-2 border-dashed border-gray-200 rounded-2xl bg-gray-50 active:bg-blue-50">
                                    <span class="text-3xl mb-1">📸</span>
                                    <span class="text-xs font-bold text-gray-500">点击拍照</span>
                                    <input type="file" ref="imgInput" class="hidden" @change="onFileChange" accept="image/*">
                                </button>
                                <div tabindex="0" @paste="onPaste" class="hidden lg:flex flex-col items-center justify-center border-2 border-dashed border-gray-200 rounded-2xl cursor-pointer p-4 focus:bg-blue-50">
                                    <span class="text-3xl mb-1">📋</span>
                                    <span class="text-xs font-bold text-gray-500">粘贴图片</span>
                                </div>
                            </div>
                        </div>

                        <!-- 填写区 -->
                        <div class="flex-1 flex flex-col md:flex-row gap-5 bg-gray-50 p-4 rounded-3xl">
                            <div class="w-full md:w-40 h-40 bg-white rounded-2xl overflow-hidden border flex items-center justify-center relative shrink-0">
                                <img v-if="newProd.image" :src="newProd.image" class="w-full h-full object-cover">
                                <span v-else class="text-gray-300 text-xs">等待图片...</span>
                                <button v-if="newProd.image" @click="newProd.image=''" class="absolute top-1 right-1 bg-red-500 text-white rounded-full w-6 h-6 text-xs">✕</button>
                            </div>
                            <div class="flex-1 space-y-4">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <input v-model="newProd.name" type="text" placeholder="货物名称" class="w-full p-4 rounded-xl border-none outline-none focus:ring-2 ring-blue-500 bg-white">
                                    <input v-model="newProd.cost" type="number" placeholder="成本价" class="w-full p-4 rounded-xl border-none outline-none focus:ring-2 ring-blue-500 bg-white">
                                </div>
                                <button @click="addProduct" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">
                                    确认录入货物
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 商品列表展示 -->
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-6">
                    <div v-for="p in stallProducts" :key="p.id" class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 group relative product-card">
                        <div class="relative pt-[100%]">
                            <img :src="p.image" class="absolute inset-0 w-full h-full object-cover">
                        </div>
                        <div class="p-3">
                            <input v-model="p.name" @change="updateProd(p)" class="text-xs md:text-sm font-bold w-full outline-none focus:text-blue-600 truncate" placeholder="未命名">
                            <div class="text-red-500 font-black mt-1 flex items-center text-sm">
                                <span>￥</span>
                                <input v-model="p.cost" @change="updateProd(p)" class="w-full outline-none bg-transparent" placeholder="0">
                            </div>
                        </div>
                        <button @click="deleteProd(p.id)" class="delete-btn absolute top-1 right-1 bg-white/90 p-2 rounded-full text-red-500 shadow-md md:opacity-0 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 4. 全局商品查询 -->
            <div v-if="view === 'all_products'" class="space-y-6">
                <!-- 返回与搜索栏 -->
                <div class="flex flex-col md:flex-row gap-4 md:items-center justify-between">
                    <button @click="view = 'home'" class="flex items-center text-blue-600 font-bold px-3 py-2 bg-blue-50 rounded-xl self-start">
                        <span class="mr-1">←</span> 返回首页
                    </button>
                    <input v-model="search" type="text" placeholder="输入名称搜索..." class="px-5 py-3 border rounded-full outline-none focus:ring-2 ring-blue-500 w-full md:w-64 bg-white shadow-sm">
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
                    <div v-for="p in filteredProducts" :key="p.id" class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-50 flex flex-col">
                        <div class="relative pt-[100%]">
                             <img :src="p.image" class="absolute inset-0 w-full h-full object-cover">
                        </div>
                        <div class="p-2.5">
                            <div class="text-[9px] text-blue-600 font-bold bg-blue-50 px-1.5 py-0.5 rounded-md inline-block mb-1 truncate max-w-full">
                                🏪 {{ getStallName(p.stallId) }}
                            </div>
                            <div class="text-xs font-bold truncate">{{ p.name || '未命名' }}</div>
                            <div class="text-red-500 text-sm font-black mt-1">￥{{ p.cost || '0' }}</div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
        
        <!-- 底部占位 -->
        <div class="h-10 md:hidden"></div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        const db = new Dexie("EcomStallDB");
        db.version(1).stores({
            stalls: 'id, name, phone, remark',
            products: '++id, stallId, name, cost'
        });

        createApp({
            setup() {
                const view = ref('home');
                const stalls = ref([]);
                const products = ref([]);
                const search = ref('');
                const showStallForm = ref(false);
                const stallForm = ref({ id: null, name: '', phone: '', remark: '' });
                const currentStall = ref(null);
                const newProd = ref({ name: '', cost: '', image: '', stallId: null });

                const load = async () => {
                    stalls.value = await db.stalls.toArray();
                    products.value = await db.products.toArray();
                };

                onMounted(load);

                const stallProducts = computed(() => {
                    return products.value.filter(p => p.stallId === currentStall.value?.id).reverse();
                });

                const filteredProducts = computed(() => {
                    if (!search.value) return [...products.value].reverse();
                    return products.value.filter(p => (p.name || '').includes(search.value)).reverse();
                });

                const openStallForm = (item = null) => {
                    stallForm.value = item ? { ...item } : { id: null, name: '', phone: '', remark: '' };
                    showStallForm.value = true;
                };

                const saveStall = async () => {
                    if (!stallForm.value.name) return alert("档口名不能为空");
                    const data = { ...stallForm.value };
                    if (!data.id) data.id = Date.now();
                    await db.stalls.put(data);
                    showStallForm.value = false;
                    await load();
                };

                const deleteStall = async (id) => {
                    if (confirm("删除档口将同时删除所有商品，确定吗？")) {
                        await db.stalls.delete(id);
                        await db.products.where('stallId').equals(id).delete();
                        await load();
                    }
                };

                const enterStall = (item) => {
                    currentStall.value = item;
                    view.value = 'stall_detail';
                    newProd.value = { name: '', cost: '', image: '', stallId: item.id };
                };

                const processImg = (file) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let w = img.width, h = img.height;
                            const max = 1000;
                            if (w > max || h > max) {
                                if (w > h) { h = (max/w)*h; w = max; }
                                else { w = (max/h)*w; h = max; }
                            }
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            newProd.value.image = canvas.toDataURL('image/jpeg', 0.8);
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                };

                const onFileChange = (e) => {
                    const file = e.target.files[0];
                    if (file) processImg(file);
                };

                const onPaste = (e) => {
                    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                    for (let item of items) {
                        if (item.type.indexOf("image") !== -1) processImg(item.getAsFile());
                    }
                };

                const addProduct = async () => {
                    if (!newProd.value.image) return alert("请先上传/拍摄图片");
                    await db.products.add({ ...newProd.value });
                    newProd.value = { name: '', cost: '', image: '', stallId: currentStall.value.id };
                    await load();
                };

                const updateProd = async (p) => await db.products.put(JSON.parse(JSON.stringify(p)));
                const deleteProd = async (id) => { if(confirm("确定删除商品？")) { await db.products.delete(id); await load(); } };

                const goHome = () => { view.value = 'home'; showStallForm.value = false; };
                const getCount = (sid) => products.value.filter(p => p.stallId === sid).length;
                const getStallName = (sid) => stalls.value.find(s => s.id === sid)?.name || '未知';

                const exportData = async () => {
                    const data = {
                        app: "STALL_MANAGER_PRO",
                        stalls: await db.stalls.toArray(),
                        products: await db.products.toArray(),
                        time: Date.now()
                    };
                    const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `档口数据备份_${new Date().toLocaleDateString()}.json`;
                    a.click();
                };

                const importData = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = async (f) => {
                        try {
                            const data = JSON.parse(f.target.result);
                            if (data.app !== "STALL_MANAGER_PRO") throw "无效文件";
                            if (confirm("这将覆盖现有数据，确定？")) {
                                await db.stalls.clear(); await db.products.clear();
                                await db.stalls.bulkAdd(data.stalls);
                                await db.products.bulkAdd(data.products);
                                await load();
                                alert("导入成功");
                            }
                        } catch (err) { alert("导入失败，文件格式不正确"); }
                    };
                    reader.readAsText(file);
                };

                return {
                    view, stalls, products, search, showStallForm, stallForm, currentStall, newProd,
                    stallProducts, filteredProducts,
                    openStallForm, saveStall, deleteStall, enterStall,
                    onFileChange, onPaste, addProduct, updateProd, deleteProd,
                    goHome, getCount, getStallName, exportData, importData
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
